<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenChat - 우리들의 광장</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4e73df;
            --bg-color: #000000;
            --container-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-sub: #b0b0b0;
            --input-bg: #2d2d2d;
        }

        body, html { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background: var(--bg-color); height: 100%; color: var(--text-main); }

        /* 닉네임 입력 모달 */
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: var(--container-bg); padding: 30px; border-radius: 15px; text-align: center; width: 300px; border: 1px solid #333; }
        .login-box input { width: 80%; padding: 12px; margin-top: 15px; border: 1px solid #444; border-radius: 8px; background: var(--input-bg); color: white; outline: none; }

        /* 홈 화면 */
        #home-screen { padding: 20px; max-width: 600px; margin: 0 auto; }
        .header { font-size: 24px; font-weight: bold; color: var(--primary-color); margin-bottom: 30px; text-align: center; }
        .room-list { display: grid; gap: 15px; }
        .room-card { background: var(--container-bg); padding: 20px; border-radius: 12px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .room-card:hover { transform: translateY(-3px); background: #252525; border-color: var(--primary-color); }

        /* 채팅 화면 */
        #chat-screen { display: none; flex-direction: column; height: 100vh; background: var(--bg-color); }
        .chat-header { background: var(--container-bg); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #333; }
        .back-btn { cursor: pointer; font-size: 20px; margin-right: 15px; color: var(--primary-color); }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        /* 메세지 줄바꿈 허용 설정 */
        .msg { 
            max-width: 75%; padding: 10px 15px; border-radius: 15px; position: relative; font-size: 14px; line-height: 1.5; 
            white-space: pre-wrap; /* \n 문자를 줄바꿈으로 렌더링 */
            word-break: break-all;
        }
        .msg.me { align-self: flex-end; background: var(--primary-color); color: white; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: var(--container-bg); color: white; border-bottom-left-radius: 2px; border: 1px solid #333; }
        .msg-info { font-size: 11px; margin-bottom: 4px; color: var(--text-sub); }

        .input-area { background: var(--container-bg); padding: 10px 15px; display: flex; gap: 10px; border-top: 1px solid #333; align-items: flex-end; }
        
        /* textarea 스타일링 */
        .input-area textarea { 
            flex: 1; border: 1px solid #444; border-radius: 15px; padding: 10px 15px; outline: none; 
            background: var(--input-bg); color: white; resize: none; height: 20px; max-height: 100px;
            font-family: inherit; font-size: 14px; line-height: 1.4;
        }

        /* 하단 오른쪽 버튼 (방 만들기) */
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary-color); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 90; }

        /* 방 만들기 팝업 */
        #create-room-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 500; }
        .modal-content { background: var(--container-bg); padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; border: 1px solid #333; }
        .modal-content input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #444; border-radius: 8px; background: var(--input-bg); color: white; outline: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h3>사용할 닉네임 입력</h3>
            <input type="text" id="nickname-input" placeholder="닉네임을 입력하고 엔터!" onkeypress="if(event.keyCode==13) setNickname()">
            <p style="font-size: 12px; color: #888; margin-top: 10px;">엔터를 누르거나 아래 버튼을 클릭하세요.</p>
            <button onclick="setNickname()" style="margin-top: 15px; padding: 10px 25px; background: var(--primary-color); border: none; color: white; border-radius: 5px; cursor: pointer;">시작하기</button>
        </div>
    </div>

    <div id="home-screen">
        <div class="header">OPEN CHAT BLACK</div>
        <div class="room-list" id="room-list"></div>
    </div>

    <div id="chat-screen">
        <div class="chat-header">
            <i class="fas fa-arrow-left back-btn" onclick="goHome()"></i>
            <span id="current-room-title" style="font-weight: bold;">방 제목</span>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <textarea id="chat-input" placeholder="메시지 입력 (Shift+Enter 줄바꿈)" rows="1"></textarea>
            <i class="fas fa-paper-plane" style="color: var(--primary-color); cursor: pointer; font-size: 20px; margin-bottom: 10px;" onclick="sendMessage()"></i>
        </div>
    </div>

    <div class="fab" id="fab" onclick="showCreateModal()">
        <i class="fas fa-plus"></i>
    </div>

    <div id="create-room-modal">
        <div class="modal-content">
            <h4>새로운 채팅방 만들기</h4>
            <input type="text" id="new-room-name" placeholder="방 제목 입력 후 엔터!" onkeypress="if(event.keyCode==13) createNewRoom()">
            <div style="text-align: right;">
                <i class="fas fa-check-circle" style="color: #28a745; font-size: 35px; cursor: pointer;" onclick="createNewRoom()"></i>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC0fST7EcUFbJi7VerRvKvQ2nOqBGaTV0E",
            authDomain: "chat-8ee63.firebaseapp.com",
            projectId: "chat-8ee63",
            storageBucket: "chat-8ee63.firebasestorage.app",
            messagingSenderId: "339787508496",
            appId: "1:339787508496:web:70b9fe4ad6f9bb5ae69395",
            measurementId: "G-15CXTB25T3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let myNickname = "";
        let currentRoomId = null;
        let unsubscribeChat = null;

        // 닉네임 설정
        window.setNickname = () => {
            const nick = document.getElementById('nickname-input').value;
            if(!nick) return alert("닉네임을 입력하세요!");
            myNickname = nick;
            document.getElementById('login-overlay').style.display = 'none';
        };

        // 방 목록 로드
        onSnapshot(query(collection(db, "rooms"), orderBy("createdAt", "desc")), (snapshot) => {
            const listEl = document.getElementById('room-list');
            listEl.innerHTML = "";
            snapshot.forEach((doc) => {
                const room = doc.data();
                const div = document.createElement('div');
                div.className = 'room-card';
                div.innerHTML = `<span>${room.title}</span> <i class="fas fa-chevron-right" style="color:#555"></i>`;
                div.onclick = () => enterRoom(doc.id, room.title);
                listEl.appendChild(div);
            });
        });

        window.showCreateModal = () => {
            document.getElementById('create-room-modal').style.display = 'flex';
            document.getElementById('new-room-name').focus();
        };
        
        window.createNewRoom = async () => {
            const title = document.getElementById('new-room-name').value;
            if(!title) return;
            await addDoc(collection(db, "rooms"), {
                title: title,
                createdAt: serverTimestamp()
            });
            document.getElementById('new-room-name').value = "";
            document.getElementById('create-room-modal').style.display = 'none';
        };

        window.enterRoom = (roomId, title) => {
            currentRoomId = roomId;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('fab').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('current-room-title').innerText = title;
            listenChat(roomId);
        };

        window.goHome = () => {
            if(unsubscribeChat) unsubscribeChat();
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('fab').style.display = 'flex';
            document.getElementById('chat-screen').style.display = 'none';
        };

        // 실시간 채팅 수신
        function listenChat(roomId) {
            const msgEl = document.getElementById('messages');
            const q = query(collection(db, `rooms/${roomId}/messages`), orderBy("createdAt", "asc"));
            unsubscribeChat = onSnapshot(q, (snapshot) => {
                msgEl.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMe = data.sender === myNickname;
                    const div = document.createElement('div');
                    div.className = `msg ${isMe ? 'me' : 'other'}`;
                    div.innerHTML = `<div class="msg-info">${data.sender}</div>${data.text}`;
                    msgEl.appendChild(div);
                });
                msgEl.scrollTop = msgEl.scrollHeight;
            });
        }

        // 메시지 전송 로직
        window.sendMessage = async () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text || !currentRoomId) return;
            
            input.value = "";
            input.style.height = '20px'; // 높이 초기화
            
            await addDoc(collection(db, `rooms/${currentRoomId}/messages`), {
                text: text,
                sender: myNickname,
                createdAt: serverTimestamp()
            });
        };

        // 엔터키 제어 (Shift+Enter는 줄바꿈, 그냥 Enter는 전송)
        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (!e.shiftKey) {
                    e.preventDefault(); // 엔터 시 기본 줄바꿈 방지
                    sendMessage();      // 메세지 전송
                }
                // Shift+Enter인 경우 이벤트 방지 안함 -> 자동으로 줄바꿈 처리됨
            }
        });

        // 텍스트 내용에 따라 높이 자동 조절 (선택 사항)
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

    </script>
</body>
</html>
